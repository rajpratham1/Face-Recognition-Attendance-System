{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-5">
        <div class="glass-card reveal-up">
            <h2 class="text-center mb-2">Portal Login</h2>
            <p class="text-center text-muted mb-4">Student, teacher, and admin access</p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@domain.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="login-password" name="password" class="form-control" required>
                        <button type="button" class="btn btn-outline-secondary" id="toggle-login-password">Show</button>
                    </div>
                </div>
                <div class="d-flex justify-content-end mb-3">
                    <a class="small" href="{{ url_for('forgot_password') }}">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-custom w-100 py-3">Login to Dashboard</button>
            </form>
            <p class="text-center mt-3 small">Need an account? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('login-password');
    const toggle = document.getElementById('toggle-login-password');
    if (!input || !toggle) return;
    toggle.addEventListener('click', function() {
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        toggle.textContent = isHidden ? 'Hide' : 'Show';
    });
});
</script>
{% endblock %}
