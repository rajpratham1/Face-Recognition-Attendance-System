{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-5">
        <div class="glass-card reveal-up">
            <h2 class="text-center mb-2">Choose a New Password</h2>
            <p class="text-center text-muted mb-4">
                Use a strong password with at least 8 characters, one number, and one uppercase letter.
            </p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" id="reset-password" name="password" class="form-control" required minlength="8">
                        <button type="button" class="btn btn-outline-secondary" id="toggle-reset-password">Show</button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" required minlength="8">
                </div>
                <button type="submit" class="btn btn-custom w-100 py-3">Update Password</button>
            </form>
            <p class="text-center mt-3 small">
                Need a fresh link? <a href="{{ url_for('forgot_password') }}">Request another reset email</a>
            </p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('reset-password');
    const toggle = document.getElementById('toggle-reset-password');
    if (!input || !toggle) return;
    toggle.addEventListener('click', function() {
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        toggle.textContent = isHidden ? 'Hide' : 'Show';
    });
});
</script>
{% endblock %}
