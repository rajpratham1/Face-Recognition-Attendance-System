{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-5">
        <div class="glass-card reveal-up">
            <h2 class="text-center mb-2">Reset Your Password</h2>
            <p class="text-center text-muted mb-4">
                Enter your account email and we will send a reset link if the account exists.
            </p>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@domain.com">
                </div>
                <button type="submit" class="btn btn-custom w-100 py-3">Send Reset Link</button>
            </form>
            <p class="text-center mt-3 small">
                Remembered it? <a href="{{ url_for('login') }}">Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
